<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cluppy – LearnUpon Support Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inconsolata:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --surface: #ffffff;
      --surface2: #ede8df;
      --border: #d8d0c4;
      --accent: #c45c2a;
      --accent2: #e07a4a;
      --accent-light: rgba(196,92,42,0.08);
      --text: #1e1a16;
      --muted: #8a7f72;
      --user-bg: #1e1a16;
      --user-text: #f5f0e8;
      --bot-bg: #ffffff;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      font-size: 15px;
      line-height: 1.7;
    }

    /* Grain texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100dvh;
      max-width: 780px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 22px 0 18px;
      border-bottom: 2px solid var(--text);
    }

    .logo {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .header-text p {
      font-size: 0.78rem;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-weight: 400;
      margin-top: 3px;
      letter-spacing: 0.02em;
    }

    .powered-tag {
      margin-left: auto;
      font-family: 'Inconsolata', monospace;
      font-size: 0.7rem;
      background: var(--text);
      color: var(--bg);
      padding: 4px 10px;
      border-radius: 4px;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    /* ── Messages ── */
    .messages {
      overflow-y: auto;
      padding: 28px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Welcome */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      padding: 48px 24px;
      animation: fadeUp .5s ease both;
    }

    .welcome-icon {
      font-size: 56px;
      line-height: 1;
    }

    .welcome h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.9rem;
      letter-spacing: -0.04em;
    }

    .welcome p {
      color: var(--muted);
      max-width: 400px;
      font-size: 0.9rem;
      font-style: italic;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .sug-btn {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-weight: 500;
      transition: all .2s;
    }
    .sug-btn:hover {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    /* Message rows */
    .msg {
      display: flex;
      gap: 12px;
      animation: fadeUp .25s ease both;
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
      margin-top: 3px;
      border: 1.5px solid var(--border);
    }

    .msg.user .avatar { background: var(--user-bg); border-color: var(--user-bg); }
    .msg.bot  .avatar { background: var(--accent); border-color: var(--accent); }

    .bubble {
      max-width: 76%;
      padding: 13px 18px;
      border-radius: var(--radius);
      font-size: 0.88rem;
      line-height: 1.75;
      box-shadow: var(--shadow);
    }

    .msg.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1.5px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .bubble p + p { margin-top: 10px; }
    .bubble a { color: var(--accent); text-underline-offset: 3px; }
    .bubble strong { font-weight: 600; }
    .bubble em { font-style: italic; color: var(--muted); }

    .bubble code {
      font-family: 'Inconsolata', monospace;
      font-size: 0.85em;
      background: var(--surface2);
      padding: 1px 6px;
      border-radius: 4px;
    }

    .bubble pre {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .bubble pre code { background: none; padding: 0; }

    .bubble ul, .bubble ol {
      padding-left: 1.4em;
      margin: 8px 0;
    }
    .bubble li { margin: 4px 0; }

    /* Typing */
    .typing-dots {
      display: flex;
      gap: 5px;
      align-items: center;
      height: 22px;
    }
    .typing-dots span {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.1s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: .18s; }
    .typing-dots span:nth-child(3) { animation-delay: .36s; }

    .error-msg { color: #b91c1c; font-style: italic; font-size: 0.84rem; }

    /* ── Input ── */
    .input-area {
      padding: 12px 0 22px;
      border-top: 2px solid var(--text);
    }

    .input-row {
      display: flex;
      gap: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      box-shadow: var(--shadow);
      transition: border-color .2s;
    }
    .input-row:focus-within { border-color: var(--accent); }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Lora', serif;
      font-size: 0.9rem;
      resize: none;
      max-height: 140px;
      line-height: 1.6;
    }
    #userInput::placeholder { color: var(--muted); font-style: italic; }

    #sendBtn {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      flex-shrink: 0;
      align-self: flex-end;
      transition: background .2s, transform .15s;
    }
    #sendBtn:hover:not(:disabled) { background: var(--text); transform: scale(1.04); }
    #sendBtn:disabled { opacity: 0.35; cursor: default; }

    .input-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      padding: 0 2px;
    }

    .input-footer span {
      font-family: 'Inconsolata', monospace;
      font-size: 0.68rem;
      color: var(--muted);
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Inconsolata', monospace;
      font-size: 0.68rem;
      cursor: pointer;
      transition: color .2s;
    }
    .clear-btn:hover { color: var(--text); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.75); opacity: .4; }
      40%            { transform: scale(1.15); opacity: 1; }
    }

    @media (max-width: 500px) {
      .bubble { max-width: 88%; }
      .welcome h2 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">📎</div>
    <div class="header-text">
      <h1>Cluppy</h1>
      <p>LearnUpon Technical Support</p>
    </div>
    <div class="powered-tag">GEMINI · FLASH</div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">📎</div>
      <h2>Hi, I'm Cluppy!</h2>
      <p>Ask me anything about LearnUpon — features, API, Webhooks, and more. I answer strictly from the official docs.</p>
      <div class="suggestions">
        <button class="sug-btn" onclick="sendSuggestion(this)">How do I set up SSO?</button>
        <button class="sug-btn" onclick="sendSuggestion(this)">How do webhooks work?</button>
        <button class="sug-btn" onclick="sendSuggestion(this)">What API endpoints exist for users?</button>
        <button class="sug-btn" onclick="sendSuggestion(this)">How do I bulk enroll learners?</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" rows="1" placeholder="Ask a LearnUpon question…" aria-label="Your question"></textarea>
      <button id="sendBtn" onclick="sendMessage()" aria-label="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span>↵ SEND · SHIFT+↵ NEW LINE</span>
      <button class="clear-btn" onclick="clearChat()">CLEAR CHAT</button>
    </div>
  </div>

</div>

<script>
  let history = [];
  let isLoading = false;

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');
  const welcomeEl  = document.getElementById('welcome');

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  function clearChat() {
    history = [];
    messagesEl.innerHTML = '';
    messagesEl.appendChild(welcomeEl);
    welcomeEl.style.display = 'flex';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderMarkdown(text) {
    return text
      .replace(/```(\w*)\n([\s\S]*?)```/g, (_, _lang, code) =>
        `<pre><code>${escHtml(code.trim())}</code></pre>`)
      .replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`)
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,
        '<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/(^|[\s>])(https?:\/\/[^\s<]+)/g,
        (_, pre, url) => `${pre}<a href="${url}" target="_blank" rel="noopener">${url}</a>`)
      .replace(/^[-*] (.+)/gm, '<li>$1</li>')
      .replace(/((<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
      .split(/\n{2,}/).map(p =>
        p.startsWith('<ul>') || p.startsWith('<pre>') ? p : `<p>${p.replace(/\n/g,'<br>')}</p>`
      ).join('');
  }

  function appendMessage(role, html, isTyping = false) {
    if (welcomeEl.parentNode) welcomeEl.style.display = 'none';

    const row    = document.createElement('div');
    row.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '🧑' : '📎';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = isTyping
      ? '<div class="typing-dots"><span></span><span></span><span></span></div>'
      : html;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    appendMessage('user', `<p>${escHtml(text)}</p>`);
    history.push({ role: 'user', content: text });

    inputEl.value = '';
    inputEl.style.height = 'auto';
    isLoading = true;
    sendBtn.disabled = true;

    const typingBubble = appendMessage('bot', '', true);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await res.json();

      if (!res.ok) {
        typingBubble.innerHTML = `<p class="error-msg">⚠️ ${escHtml(data.error || 'Server error')}</p>`;
        return;
      }

      const reply = data.reply || "I couldn't find an answer in the LearnUpon docs.";
      history.push({ role: 'assistant', content: reply });
      typingBubble.innerHTML = renderMarkdown(reply);
      messagesEl.scrollTop = messagesEl.scrollHeight;

    } catch (err) {
      typingBubble.innerHTML = `<p class="error-msg">⚠️ Could not reach the server. Is it deployed?</p>`;
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
